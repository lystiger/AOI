server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: aoi-inference
    static_configs:
      - targets:
          - localhost
        labels:
          job: aoi-inference
          app: aoi
          __path__: /var/log/aoi/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            pcb_id: pcb_id
            component_id: component_id
            inspection_result: inspection_result
            defect_type: defect_type
            confidence_score: confidence_score
            inference_latency_ms: inference_latency_ms
      - labels:
          pcb_id:
          component_id:
          inspection_result:
          defect_type:

