services:
  aoi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aoi-app
    ports:
      - "8000:8000"
    volumes:
      - aoi-logs:/var/log/aoi
      - aoi-data:/var/lib/aoi

  aoi-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: aoi-web
    depends_on:
      - aoi-app
    environment:
      VITE_PROXY_TARGET: http://aoi-app:8000
    ports:
      - "5173:5173"

  aoi-mock-sender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aoi-mock-sender
    command:
      - python
      - -m
      - aoi.cli
      - send-mock-events
      - --batch-size
      - "5"
      - --interval-seconds
      - "5"
      - --endpoint
      - http://aoi-app:8000/events
    depends_on:
      - aoi-app

  loki:
    image: grafana/loki:3.0.0
    container_name: aoi-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/config.yml:/etc/loki/config.yml:ro

  promtail:
    image: grafana/promtail:3.0.0
    container_name: aoi-promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./deploy/promtail/config.yml:/etc/promtail/config.yml:ro
      - aoi-logs:/var/log/aoi:ro

  grafana:
    image: grafana/grafana:11.0.0
    container_name: aoi-grafana
    depends_on:
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  aoi-logs:
  aoi-data:
